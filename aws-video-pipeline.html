<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Upload Pipeline on AWS — System Design Classroom</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #f7f8fa;
    --fg: #1a1a1a;
    --fg-muted: #6b7280;
    --border: #e2e4e8;
    --accent: #f59e0b;
    --accent-light: #fef3c7;
    --accent-fg: #1a1a1a;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --pill-bg: #f1f3f5;
    --pill-fg: #4b5563;
    --node-inactive: #d1d5db;
    --node-inactive-text: #9ca3af;
    --sim-bg: #f9fafb;
    --sim-border: #e5e7eb;
    --badge-bg: #fff7ed;
    --badge-fg: #c2410c;
    --worker-bg: #f3f4f6;
    --aws-orange: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --bg-alt: #181a20;
      --fg: #e5e7eb;
      --fg-muted: #9ca3af;
      --border: #2d3039;
      --accent: #f59e0b;
      --accent-light: #422006;
      --accent-fg: #ffffff;
      --green: #22c55e;
      --green-bg: #0a1f0f;
      --green-border: #166534;
      --red: #ef4444;
      --red-bg: #1f0a0a;
      --red-border: #7f1d1d;
      --pill-bg: #1f2028;
      --pill-fg: #9ca3af;
      --node-inactive: #3f4350;
      --node-inactive-text: #6b7280;
      --sim-bg: #13141b;
      --sim-border: #2d3039;
      --badge-bg: #2a1a05;
      --badge-fg: #fbbf24;
      --worker-bg: #1a1c24;
      --aws-orange: #f59e0b;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1080px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.3px; }
  h1 span { color: var(--fg-muted); font-weight: 400; }
  h1 .aws-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
    background: var(--accent); color: var(--accent-fg);
    vertical-align: middle; margin-left: 8px; letter-spacing: 0.5px;
  }

  .pill-nav {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 24px;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 16px;
  }
  .pill {
    font-size: 12px; padding: 5px 12px;
    border-radius: 100px;
    background: var(--pill-bg);
    color: var(--pill-fg);
    border: 0.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    font-weight: 500;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }

  .main { display: grid; grid-template-columns: 220px 1fr; gap: 24px; margin-bottom: 24px; }
  @media (max-width: 720px) { .main { grid-template-columns: 1fr; } }

  .diagram-col {
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 16px 12px;
    background: var(--bg-alt);
  }
  .diagram-col h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--fg-muted); margin-bottom: 12px; }

  .info-panel { min-width: 0; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--badge-bg);
    color: var(--badge-fg);
    margin-bottom: 10px;
    letter-spacing: 0.2px;
  }
  .info-panel h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.4px; }
  .info-panel p.explain { font-size: 14px; color: var(--fg-muted); margin-bottom: 18px; line-height: 1.7; }
  .svc-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .svc-chip {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 4px; border: 0.5px solid var(--accent);
    background: var(--accent-light); color: var(--badge-fg);
  }
  .tradeoff-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) { .tradeoff-row { grid-template-columns: 1fr; } }
  .tradeoff-card {
    border-radius: 6px;
    padding: 14px;
    border: 0.5px solid;
    font-size: 13px;
    line-height: 1.6;
  }
  .tradeoff-card.pro { background: var(--green-bg); border-color: var(--green-border); }
  .tradeoff-card.con { background: var(--red-bg); border-color: var(--red-border); }
  .tradeoff-card h4 { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .tradeoff-card.pro h4 { color: var(--green); }
  .tradeoff-card.con h4 { color: var(--red); }

  .sim-panel {
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg-alt);
    padding: 18px 20px;
  }
  .sim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .sim-header h3 { font-size: 13px; font-weight: 600; }
  .sim-area {
    background: var(--sim-bg);
    border: 0.5px solid var(--sim-border);
    border-radius: 6px;
    min-height: 110px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sim-note {
    font-size: 11px; color: var(--fg-muted);
    margin-top: 10px;
    font-style: italic;
  }

  .btn {
    font-size: 12px; padding: 6px 16px;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.12s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.9; }
  .btn.primary:disabled { opacity: 0.4; }
  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid var(--border);
  }
  .nav-row .step-count { font-size: 12px; color: var(--fg-muted); }

  /* === SIMULATION ELEMENTS === */
  .chunk-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .chunk {
    width: 40px; height: 28px; border-radius: 4px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: var(--fg-muted);
    opacity: 0;
    transition: opacity 0.3s, background 0.3s, border-color 0.3s, color 0.3s;
  }
  .chunk.visible { opacity: 1; }
  .chunk.done { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }

  .gw-flow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .gw-node {
    padding: 6px 10px; border-radius: 4px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; color: var(--fg-muted);
    transition: all 0.3s; white-space: nowrap;
  }
  .gw-node.lit { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
  .gw-arrow { color: var(--node-inactive); font-size: 14px; }
  .gw-arrow.lit { color: var(--accent); }

  .os-status {
    font-size: 16px; font-weight: 700; color: var(--fg-muted);
    transition: color 0.3s;
  }
  .os-status.accepted { color: var(--green); }

  .mq-container { display: flex; align-items: center; gap: 16px; width: 100%; flex-wrap: wrap; }
  .mq-queue {
    display: flex; gap: 4px; flex: 1; min-height: 36px;
    border: 0.5px solid var(--border); border-radius: 4px;
    padding: 6px; align-items: center; background: var(--bg);
    min-width: 120px;
  }
  .mq-job {
    width: 28px; height: 24px; border-radius: 3px;
    background: var(--accent-light);
    border: 0.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: var(--badge-fg);
    transition: all 0.3s;
  }
  .mq-job.consumed { opacity: 0.2; }
  .mq-label { font-size: 10px; color: var(--fg-muted); font-weight: 600; white-space: nowrap; }

  .worker-row { display: flex; gap: 12px; width: 100%; flex-wrap: wrap; justify-content: center; }
  .worker-box {
    border: 0.5px solid var(--border); border-radius: 6px;
    padding: 12px 16px; background: var(--worker-bg);
    text-align: center; min-width: 100px; flex: 1; max-width: 160px;
  }
  .worker-box .res { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .worker-box .wstatus {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 100px; display: inline-block;
    background: var(--pill-bg); color: var(--fg-muted);
    transition: all 0.3s;
  }
  .worker-box .wstatus.encoding { background: var(--accent-light); color: var(--badge-fg); }
  .worker-box .wstatus.done { background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green-border); }
  .worker-box .wbar {
    height: 4px; border-radius: 2px; background: var(--border);
    margin-top: 8px; overflow: hidden;
  }
  .worker-box .wbar-fill {
    height: 100%; width: 0; background: var(--accent);
    border-radius: 2px; transition: width 0.1s linear;
  }
  .worker-box .wbar-fill.done-bar { background: var(--green); }

  .cdn-slots { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .cdn-slot {
    width: 72px; height: 48px; border-radius: 4px;
    border: 0.5px solid var(--border); background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: var(--fg-muted);
    transition: all 0.3s;
  }
  .cdn-slot .cdn-label { font-size: 8px; font-weight: 400; margin-top: 2px; }
  .cdn-slot.hit { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .cdn-slot.miss { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
  .cdn-slot.fill { background: var(--accent-light); border-color: var(--accent); color: var(--badge-fg); }
  .cdn-msg { font-size: 12px; font-weight: 600; margin-left: 12px; min-width: 120px; }

  /* === OVERVIEW === */
  .overview-layout { display: block; }
  .overview-layout .diagram-col { display: none; }
  .overview-layout .info-panel { width: 100%; }

  .ov-flowchart {
    width: 100%; border: 0.5px solid var(--border);
    border-radius: 8px; background: var(--bg-alt);
    padding: 20px 12px; margin-bottom: 16px;
  }
  .ov-flowchart svg { width: 100%; display: block; }
  .ov-flowchart svg .fc-node { cursor: pointer; }
  .ov-flowchart svg .fc-node rect { transition: fill 0.15s, stroke 0.15s; }
  .ov-flowchart svg .fc-node:hover rect { fill: var(--accent); stroke: var(--accent); }
  .ov-flowchart svg .fc-node:hover .fc-title { fill: var(--accent-fg); }
  .ov-flowchart svg .fc-node:hover .fc-concept { fill: var(--accent-fg); opacity: 0.8; }
  .ov-flowchart svg .fc-node:hover .fc-num { fill: var(--accent-fg); }

  .ov-detail-bar {
    border: 0.5px solid var(--border); border-radius: 6px;
    background: var(--bg-alt); padding: 14px 18px;
    margin-bottom: 0; min-height: 52px;
    display: flex; align-items: flex-start; gap: 16px;
    transition: border-color 0.2s;
  }
  .ov-detail-bar.has-selection { border-color: var(--accent); }
  .ov-detail-bar .ov-detail-prompt { font-size: 13px; color: var(--fg-muted); line-height: 1.6; }
  .ov-detail-bar .ov-detail-num {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 24px; height: 24px; border-radius: 100px;
    background: var(--accent); color: var(--accent-fg);
    font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .ov-detail-bar .ov-detail-content { flex: 1; min-width: 0; }
  .ov-detail-bar .ov-detail-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .ov-detail-bar .ov-detail-concept { font-size: 11px; color: var(--badge-fg); font-weight: 600; }
  .ov-detail-bar .ov-detail-desc { font-size: 13px; color: var(--fg-muted); margin-top: 6px; line-height: 1.6; }
  .ov-detail-bar .ov-detail-link {
    font-size: 12px; color: var(--accent); cursor: pointer; margin-top: 6px;
    display: inline-block; font-weight: 600;
  }
  .ov-detail-bar .ov-detail-link:hover { text-decoration: underline; }

  .ov-e2e-flow { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: center; width: 100%; }
  .ov-e2e-node {
    padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: 600;
    border: 0.5px solid var(--border); background: var(--bg);
    color: var(--fg-muted); transition: all 0.3s; white-space: nowrap;
  }
  .ov-e2e-node.lit { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
  .ov-e2e-node.done { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .ov-e2e-arrow { color: var(--node-inactive); font-size: 12px; transition: color 0.3s; }
  .ov-e2e-arrow.lit { color: var(--accent); }
  .ov-e2e-status { font-size: 12px; font-weight: 600; color: var(--fg-muted); margin-left: 8px; width: 100%; text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>Video Upload Pipeline <span>— AWS Implementation</span><span class="aws-tag">AWS</span></h1>

  <div class="pill-nav" id="pillNav"></div>

  <div class="main">
    <div class="diagram-col">
      <h3>AWS Stack</h3>
      <svg id="pipelineSvg" viewBox="0 0 196 460" xmlns="http://www.w3.org/2000/svg" width="100%"></svg>
    </div>
    <div class="info-panel" id="infoPanel"></div>
  </div>

  <div class="sim-panel">
    <div class="sim-header">
      <h3 id="simTitle">Simulation</h3>
      <button class="btn primary" id="runBtn" onclick="runSim()">Run simulation</button>
    </div>
    <div class="sim-area" id="simArea"></div>
    <div class="sim-note" id="simNote"></div>
  </div>

  <div class="nav-row">
    <button class="btn" id="prevBtn" onclick="go(-1)">← Previous</button>
    <span class="step-count" id="stepCount"></span>
    <button class="btn" id="nextBtn" onclick="go(1)">Next →</button>
  </div>
</div>

<script>
const STEPS = [
  {
    id: 'upload', title: 'S3 Multipart Upload', pill: 'S3 Upload',
    concept: 'S3 + Transfer Acceleration',
    services: ['Amazon S3', 'S3 Transfer Acceleration', 'AWS SDK'],
    explain: 'The client uses the S3 Multipart Upload API to split files into 5 MB–5 GB parts. The SDK calls CreateMultipartUpload to get an UploadId, then PUTs each part in parallel. If a part fails, only that part retries. S3 Transfer Acceleration routes uploads through CloudFront edge locations to accelerate cross-region transfers over optimised AWS backbone routes.',
    pro: 'Native S3 feature — no custom chunking server needed. Parts upload in parallel for maximum throughput. Transfer Acceleration can cut upload time by 50–500% for distant users. Free if not faster.',
    con: 'Incomplete multipart uploads accumulate storage cost if not cleaned up — you need a lifecycle policy to abort stale uploads. Transfer Acceleration adds $0.04–0.08/GB on top of standard PUT pricing.',
    simNote: 'Each part is uploaded via a separate PUT request. S3 assembles them on CompleteMultipartUpload.'
  },
  {
    id: 'gateway', title: 'API Gateway + Cognito', pill: 'API Gateway',
    concept: 'Amazon API Gateway + WAF',
    services: ['API Gateway', 'Cognito', 'AWS WAF', 'Lambda Authorizer'],
    explain: 'Amazon API Gateway exposes a REST or HTTP API that fronts all backend services. A Cognito User Pool handles OAuth2 / JWT issuance, and a Cognito Authorizer on the gateway validates tokens on every request. AWS WAF attaches to the gateway to provide rate limiting, geo-blocking, and bot detection. Usage Plans and API Keys enforce per-client throttling.',
    pro: 'Fully managed — no servers to patch. WAF rules update in real time. Cognito handles sign-up, MFA, and token refresh out of the box. Usage Plans give per-key burst + sustained rate limits.',
    con: 'API Gateway has a 10 MB payload limit (REST) / 10 MB (HTTP API) — too small for video. The actual upload bypasses the gateway via a pre-signed S3 URL. Cold-start latency if backed by Lambda. WAF rules can get expensive at high request volumes.',
    simNote: 'Request flows: WAF → Cognito Auth → Throttle → Lambda/integration. Video upload uses a pre-signed URL that skips the gateway.'
  },
  {
    id: 'store', title: 'S3 + DynamoDB', pill: 'S3 + Dynamo',
    concept: 'Durable Storage + Metadata',
    services: ['Amazon S3', 'DynamoDB', 'S3 Event Notifications', 'Lambda'],
    explain: 'Raw video lands in an S3 bucket (11 nines durability). A DynamoDB table serves as the metadata store — tracking upload status, user ID, timestamps, and processing state. S3 Event Notifications (or EventBridge) fire on ObjectCreated, triggering a Lambda that writes the initial metadata record and returns a job reference. The client gets a 202 immediately via the API.',
    pro: 'S3 gives virtually unlimited storage with 99.999999999% durability. DynamoDB handles metadata reads/writes at single-digit-ms latency. Event Notifications are built-in — no polling needed.',
    con: 'S3 is eventually consistent for overwrites (read-after-write is immediate for new objects). DynamoDB costs scale with read/write capacity — hot partitions need careful key design. Event Notifications can duplicate — downstream must be idempotent.',
    simNote: 'Object lands in S3 → Event fires → Lambda writes DynamoDB metadata → 202 returned to client.'
  },
  {
    id: 'queue', title: 'SQS + EventBridge', pill: 'SQS',
    concept: 'SQS FIFO + Dead Letter Queue',
    services: ['Amazon SQS', 'EventBridge', 'SQS Dead Letter Queue', 'CloudWatch'],
    explain: 'The Lambda triggered by S3 publishes a transcode job message to an SQS queue. SQS guarantees at-least-once delivery with a configurable visibility timeout (e.g. 15 min for long transcodes). If a consumer fails to delete the message, it reappears. After N failures, the message moves to a Dead Letter Queue (DLQ) for manual inspection. CloudWatch monitors ApproximateAgeOfOldestMessage for lag alerts.',
    pro: 'SQS is serverless and scales to unlimited throughput. DLQ captures poison messages automatically. FIFO queues available if ordering matters. Costs just $0.40 per million requests.',
    con: 'Standard SQS is at-least-once — consumers must be idempotent. FIFO queues cap at 3,000 msg/s with batching. No built-in message replay (unlike Kinesis/Kafka). Visibility timeout must be tuned to match processing time or messages reappear prematurely.',
    simNote: 'Lambda enqueues transcode jobs. Workers poll and delete on success. Failures route to the DLQ after 3 retries.'
  },
  {
    id: 'workers', title: 'MediaConvert + ECS', pill: 'Workers',
    concept: 'Elastic MediaConvert + Fargate',
    services: ['AWS Elemental MediaConvert', 'ECS Fargate', 'Step Functions', 'Auto Scaling'],
    explain: 'AWS Elemental MediaConvert is a file-based transcoding service — you submit a job specifying input S3 URI, output formats (H.264/HEVC, 360p–4K), and it handles the compute. For custom pipelines, ECS Fargate tasks run FFmpeg containers that auto-scale based on SQS queue depth. A Step Functions state machine orchestrates the fan-out (one job per rendition) and fan-in (wait for all to complete, then update DynamoDB status).',
    pro: 'MediaConvert is fully managed — no capacity planning. Pay per minute of output video. Fargate tasks scale to zero when idle. Step Functions give visual workflow debugging and automatic retries.',
    con: 'MediaConvert pricing can be high for heavy workloads ($0.015–0.048/min per output). Fargate cold-starts add 30–60s. Step Functions charge per state transition ($0.025/1K). Custom FFmpeg on Fargate needs container image management.',
    simNote: 'Three parallel jobs (360p, 720p, 1080p) submitted to MediaConvert. Total time = slowest rendition, not the sum.'
  },
  {
    id: 'cdn', title: 'CloudFront CDN', pill: 'CloudFront',
    concept: 'CloudFront + Origin Shield',
    services: ['Amazon CloudFront', 'Origin Shield', 'Lambda@Edge', 'S3 Origin'],
    explain: 'Transcoded renditions in S3 are served through CloudFront, AWS\'s global CDN with 600+ edge locations. Origin Shield adds a centralized cache layer that reduces origin fetches when multiple edge locations request the same object simultaneously. Lambda@Edge can rewrite URLs for adaptive bitrate streaming (HLS/DASH manifest rewriting). Signed URLs or signed cookies restrict access to authorized viewers.',
    pro: 'Sub-50ms latency worldwide with 600+ PoPs. Origin Shield collapses cache misses — the origin sees minimal traffic even during viral spikes. Signed URLs prevent hotlinking. Free tier: 1 TB/month transfer.',
    con: 'Cache invalidation is limited to 1,000 free paths/month — wildcard invalidations count as one. Origin Shield adds $0.0090/10K requests. Lambda@Edge has no VPC access and 5s execution limit. Debugging edge functions requires CloudWatch in each region.',
    simNote: 'First request: edge MISS → Origin Shield MISS → S3 origin. Second request from same region: edge HIT. Second region: Origin Shield HIT.'
  }
];

let current = -1;
let simRunning = false;
let simTimers = [];

function clearTimers() { simTimers.forEach(t => clearTimeout(t)); simTimers = []; simRunning = false; }
function isOverview() { return current === -1; }

function render() {
  clearTimers();
  const mainEl = document.querySelector('.main');

  document.getElementById('pillNav').innerHTML =
    `<div class="pill${isOverview() ? ' active' : ''}" onclick="goTo(-1)">Overview</div>` +
    STEPS.map((st, i) =>
      `<div class="pill${i === current ? ' active' : ''}" onclick="goTo(${i})">${st.pill}</div>`
    ).join('');

  if (isOverview()) {
    mainEl.classList.add('overview-layout');
    mainEl.style.display = 'block';
    document.getElementById('pipelineSvg').parentElement.style.display = 'none';

    const summaries = [
      'S3 Multipart Upload + Transfer Acceleration for resilient, fast ingestion',
      'API Gateway + Cognito + WAF for managed auth, throttling, and protection',
      'S3 for blob storage, DynamoDB for metadata, Event Notifications for triggers',
      'SQS queues with DLQ for reliable, decoupled job delivery',
      'MediaConvert or ECS Fargate for elastic parallel transcoding',
      'CloudFront with Origin Shield for global low-latency delivery'
    ];
    const icons = ['☁','🛡','💾','📨','⚙','🌐'];
    const concepts = STEPS.map(s => s.concept);

    const bw = 150, bh = 64, gapX = 30, gapY = 24;
    const cols = 3, padX = 16, padY = 16;
    const svgW = cols * bw + (cols - 1) * gapX + padX * 2;
    const svgH = 2 * bh + gapY + padY * 2 + 20;

    let svgContent = '';
    const positions = [];
    for (let i = 0; i < 6; i++) {
      const row = Math.floor(i / cols);
      const col = i % cols;
      const x = padX + col * (bw + gapX);
      const y = padY + row * (bh + gapY + 20);
      positions.push({ x, y, cx: x + bw / 2, cy: y + bh / 2 });
    }

    for (let i = 0; i < 5; i++) {
      const from = positions[i], to = positions[i + 1];
      if (Math.floor(i / cols) === Math.floor((i + 1) / cols)) {
        const x1 = from.x + bw + 2, x2 = to.x - 2, y = from.cy;
        svgContent += `<line x1="${x1}" y1="${y}" x2="${x2 - 5}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
        svgContent += `<polygon points="${x2-7},${y-4} ${x2-7},${y+4} ${x2},${y}" fill="var(--border)"/>`;
      } else {
        const x1 = from.cx, y1 = from.y + bh + 2, x2 = to.cx, y2 = to.y - 2;
        const midY = y1 + (y2 - y1) / 2;
        svgContent += `<path d="M${x1},${y1} L${x1},${midY} L${x2},${midY} L${x2},${y2-5}" stroke="var(--border)" stroke-width="1" fill="none"/>`;
        svgContent += `<polygon points="${x2-4},${y2-7} ${x2+4},${y2-7} ${x2},${y2}" fill="var(--border)"/>`;
      }
    }

    for (let i = 0; i < 6; i++) {
      const p = positions[i];
      svgContent += `<g class="fc-node" onclick="ovSelect(${i})" data-idx="${i}">
        <rect x="${p.x}" y="${p.y}" width="${bw}" height="${bh}" rx="6"
          fill="var(--node-inactive)" stroke="var(--border)" stroke-width="0.5"/>
        <text class="fc-num" x="${p.x+12}" y="${p.y+18}" font-size="10" font-weight="700"
          fill="var(--node-inactive-text)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">${icons[i]}</text>
        <text class="fc-title" x="${p.x+24}" y="${p.y+18}" font-size="11" font-weight="700"
          fill="var(--node-inactive-text)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">${STEPS[i].pill}</text>
        <text class="fc-concept" x="${p.x+bw/2}" y="${p.y+38}" text-anchor="middle" font-size="9" font-weight="500"
          fill="var(--node-inactive-text)" opacity="0.7" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">${concepts[i]}</text>
        <text x="${p.x+bw/2}" y="${p.y+54}" text-anchor="middle" font-size="10" font-weight="600"
          fill="var(--node-inactive-text)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">${i+1} / 6</text>
      </g>`;
    }

    document.getElementById('infoPanel').innerHTML = `
      <div class="badge">AWS Architecture</div>
      <h2>Pipeline Overview</h2>
      <p class="explain" style="margin-bottom:14px">This maps the video upload pipeline to real AWS services. Click any stage in the flowchart to preview it, or double-click to jump into the deep dive.</p>
      <div class="ov-flowchart">
        <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" id="ovFlowSvg"></svg>
      </div>
      <div class="ov-detail-bar" id="ovDetailBar">
        <div class="ov-detail-prompt">Click a stage above to see the AWS services involved</div>
      </div>
    `;
    document.getElementById('ovFlowSvg').innerHTML = svgContent;
    document.querySelectorAll('.fc-node').forEach(node => {
      node.addEventListener('dblclick', () => { goTo(parseInt(node.dataset.idx)); });
    });
    window._ovSummaries = summaries;

    document.getElementById('simTitle').textContent = 'Simulation — End-to-End AWS Flow';
    document.getElementById('simNote').textContent = 'A video flows through the full AWS stack from upload to global delivery.';
    document.getElementById('simArea').innerHTML = buildSimHTML(-1);
    document.getElementById('runBtn').disabled = false;

    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = false;
    document.getElementById('stepCount').textContent = 'Overview';
    return;
  }

  // Normal step view
  mainEl.classList.remove('overview-layout');
  mainEl.style.display = '';
  document.getElementById('pipelineSvg').parentElement.style.display = '';
  const s = STEPS[current];

  renderPipeline();

  document.getElementById('infoPanel').innerHTML = `
    <div class="badge">${s.concept}</div>
    <h2>${s.title}</h2>
    <div class="svc-row">${s.services.map(sv => `<span class="svc-chip">${sv}</span>`).join('')}</div>
    <p class="explain">${s.explain}</p>
    <div class="tradeoff-row">
      <div class="tradeoff-card pro"><h4>✓ Why it works</h4>${s.pro}</div>
      <div class="tradeoff-card con"><h4>✗ The tradeoff</h4>${s.con}</div>
    </div>
  `;

  document.getElementById('simTitle').textContent = `Simulation — ${s.title}`;
  document.getElementById('simNote').textContent = s.simNote;
  document.getElementById('simArea').innerHTML = buildSimHTML(current);
  document.getElementById('runBtn').disabled = false;

  document.getElementById('prevBtn').disabled = false;
  document.getElementById('nextBtn').disabled = current === STEPS.length - 1;
  document.getElementById('stepCount').textContent = `${current + 1} / ${STEPS.length}`;
}

function renderPipeline() {
  const svg = document.getElementById('pipelineSvg');
  const labels = ['S3 Upload','API Gateway','S3 + Dynamo','SQS Queue','MediaConvert','CloudFront'];
  const icons = ['☁','🛡','💾','📨','⚙','🌐'];
  let html = '';
  const yStart = 16, gap = 76, boxW = 164, boxH = 44, cx = 98;
  for (let i = 0; i < 6; i++) {
    const y = yStart + i * gap;
    const active = i === current;
    const fill = active ? 'var(--accent)' : 'var(--node-inactive)';
    const textFill = active ? 'var(--accent-fg)' : 'var(--node-inactive-text)';
    const strokeW = active ? 1.5 : 0.5;
    html += `<rect x="${cx-boxW/2}" y="${y}" width="${boxW}" height="${boxH}" rx="6"
      fill="${fill}" stroke="${active ? 'var(--accent)' : 'var(--border)'}" stroke-width="${strokeW}"/>`;
    html += `<text x="${cx}" y="${y+27}" text-anchor="middle"
      font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif"
      font-size="12" font-weight="${active ? 700 : 500}" fill="${textFill}">${icons[i]} ${labels[i]}</text>`;
    if (i < 5) {
      const ay = y + boxH + 4;
      html += `<line x1="${cx}" y1="${ay}" x2="${cx}" y2="${ay+gap-boxH-8}"
        stroke="${i===current||i+1===current ? 'var(--accent)' : 'var(--border)'}"
        stroke-width="0.5" stroke-dasharray="${i===current||i+1===current ? 'none' : '3,3'}"/>`;
      html += `<polygon points="${cx-4},${ay+gap-boxH-12} ${cx+4},${ay+gap-boxH-12} ${cx},${ay+gap-boxH-6}"
        fill="${i===current||i+1===current ? 'var(--accent)' : 'var(--border)'}"/>`;
    }
  }
  svg.innerHTML = html;
}

function buildSimHTML(step) {
  if (step === -1) {
    const names = ['S3 Upload','API GW','S3+Dynamo','SQS','MediaConvert','CloudFront'];
    return `<div class="ov-e2e-flow">
      ${names.map((n,i) =>
        `<div class="ov-e2e-node" id="oe${i}">${n}</div>${i<5?'<span class="ov-e2e-arrow" id="oea'+i+'">→</span>':''}`
      ).join('')}
      <div class="ov-e2e-status" id="oeStatus">Ready</div>
    </div>`;
  }
  switch(step) {
    case 0:
      return `<div class="chunk-row">${Array.from({length:8}, (_,i) =>
        `<div class="chunk" id="ch${i}">P${i+1}</div>`).join('')}
        <span style="font-size:11px;color:var(--fg-muted);margin-left:8px" id="uploadStatus">Ready — CreateMultipartUpload</span></div>`;
    case 1:
      return `<div class="gw-flow">
        <div class="gw-node" id="gw0">WAF</div><span class="gw-arrow" id="ga0">→</span>
        <div class="gw-node" id="gw1">Cognito</div><span class="gw-arrow" id="ga1">→</span>
        <div class="gw-node" id="gw2">Throttle</div><span class="gw-arrow" id="ga2">→</span>
        <div class="gw-node" id="gw3">Lambda</div>
        <span style="font-size:11px;color:var(--fg-muted);margin-left:8px" id="gwStatus">Ready</span></div>`;
    case 2:
      return `<div class="gw-flow">
        <div class="gw-node" id="os0">S3 PUT</div><span class="gw-arrow" id="oa0">→</span>
        <div class="gw-node" id="os1">EventBridge</div><span class="gw-arrow" id="oa1">→</span>
        <div class="gw-node" id="os2">Lambda</div><span class="gw-arrow" id="oa2">→</span>
        <div class="gw-node" id="os3">DynamoDB</div>
        <span class="os-status" id="osStatus" style="margin-left:12px">…</span></div>`;
    case 3:
      return `<div class="mq-container">
        <span class="mq-label">Lambda →</span>
        <div class="mq-queue" id="mqQueue"><span style="font-size:9px;color:var(--fg-muted)">SQS</span></div>
        <span class="mq-label">→ Worker</span>
        <span style="font-size:11px;color:var(--fg-muted)" id="mqStatus">Ready</span>
        <div style="width:100%;margin-top:8px;display:flex;gap:8px;align-items:center">
          <span class="mq-label" style="color:var(--red)">DLQ →</span>
          <div class="mq-queue" id="mqDLQ" style="flex:0.4;border-color:var(--red-border)"></div>
        </div></div>`;
    case 4:
      return `<div class="worker-row">
        ${['360p','720p','1080p'].map((r,i) => `<div class="worker-box" id="wk${i}">
          <div class="res">${r}</div>
          <span class="wstatus" id="ws${i}">idle</span>
          <div class="wbar"><div class="wbar-fill" id="wb${i}"></div></div>
          <div style="font-size:9px;color:var(--fg-muted);margin-top:4px">MediaConvert</div>
        </div>`).join('')}
      </div>`;
    case 5:
      return `<div class="cdn-slots">
        ${['Edge-US','Shield','Edge-EU','Edge-Asia'].map((r,i) => `<div class="cdn-slot" id="cdn${i}">
          ${r}<span class="cdn-label">—</span>
        </div>`).join('')}
        <span class="cdn-msg" id="cdnMsg">Ready</span></div>`;
  }
}

function runSim() {
  clearTimers();
  simRunning = true;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('simArea').innerHTML = buildSimHTML(current);
  switch(current) {
    case -1: simOverview(); break;
    case 0: simUpload(); break;
    case 1: simGateway(); break;
    case 2: simObjectStore(); break;
    case 3: simQueue(); break;
    case 4: simWorkers(); break;
    case 5: simCDN(); break;
  }
}

function ovSelect(idx) {
  document.querySelectorAll('.fc-node rect').forEach((r, i) => {
    if (i === idx) {
      r.setAttribute('fill', 'var(--accent)');
      r.setAttribute('stroke', 'var(--accent)');
      r.setAttribute('stroke-width', '1.5');
    } else {
      r.setAttribute('fill', 'var(--node-inactive)');
      r.setAttribute('stroke', 'var(--border)');
      r.setAttribute('stroke-width', '0.5');
    }
  });
  document.querySelectorAll('.fc-node .fc-title').forEach((t, i) => {
    t.setAttribute('fill', i === idx ? 'var(--accent-fg)' : 'var(--node-inactive-text)');
  });
  document.querySelectorAll('.fc-node .fc-concept').forEach((t, i) => {
    t.setAttribute('fill', i === idx ? 'var(--accent-fg)' : 'var(--node-inactive-text)');
  });
  document.querySelectorAll('.fc-node .fc-num').forEach((t, i) => {
    t.setAttribute('fill', i === idx ? 'var(--accent-fg)' : 'var(--node-inactive-text)');
  });
  document.querySelectorAll('.fc-node').forEach((g, i) => {
    const texts = g.querySelectorAll('text');
    if (texts[3]) texts[3].setAttribute('fill', i === idx ? 'var(--accent-fg)' : 'var(--node-inactive-text)');
  });

  const s = STEPS[idx];
  const bar = document.getElementById('ovDetailBar');
  bar.classList.add('has-selection');
  bar.innerHTML = `
    <span class="ov-detail-num">${idx + 1}</span>
    <div class="ov-detail-content">
      <div class="ov-detail-title">${s.title}</div>
      <div class="ov-detail-concept">${s.services.join(' · ')}</div>
      <div class="ov-detail-desc">${window._ovSummaries[idx]}</div>
      <span class="ov-detail-link" onclick="goTo(${idx})">Deep dive →</span>
    </div>
  `;
}

function simOverview() {
  const names = ['Uploading to S3…','Authenticating via Cognito…','Writing metadata to DynamoDB…','Enqueuing to SQS…','Transcoding via MediaConvert…','Distributing via CloudFront…'];
  for (let i = 0; i < 6; i++) {
    simTimers.push(setTimeout(() => {
      const node = document.getElementById(`oe${i}`);
      const status = document.getElementById('oeStatus');
      if (node) node.classList.add('lit');
      if (i > 0) { const a = document.getElementById(`oea${i-1}`); if (a) a.classList.add('lit'); }
      if (status) status.textContent = names[i];
    }, i * 900));
    simTimers.push(setTimeout(() => {
      const node = document.getElementById(`oe${i}`);
      const status = document.getElementById('oeStatus');
      if (node) { node.classList.remove('lit'); node.classList.add('done'); }
      if (i === 5 && status) status.textContent = '✓ Video live on CloudFront — end-to-end complete';
    }, i * 900 + 600));
  }
}

function simUpload() {
  const status = document.getElementById('uploadStatus');
  status.textContent = 'CreateMultipartUpload → UploadId received';
  for (let i = 0; i < 8; i++) {
    simTimers.push(setTimeout(() => {
      const c = document.getElementById(`ch${i}`);
      if (!c) return;
      c.classList.add('visible');
      status.textContent = `UploadPart ${i+1}/8 → S3…`;
      simTimers.push(setTimeout(() => {
        c.classList.add('done');
        if (i === 7) status.textContent = '✓ CompleteMultipartUpload — object assembled';
      }, 200));
    }, 400 + i * 350));
  }
}

function simGateway() {
  const ids = ['gw0','ga0','gw1','ga1','gw2','ga2','gw3'];
  const status = document.getElementById('gwStatus');
  const labels = ['WAF checking rules…','','Validating JWT…','','Usage Plan check…','','✓ Lambda invoked'];
  ids.forEach((id, i) => {
    simTimers.push(setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.classList.add('lit');
      if (labels[i]) status.textContent = labels[i];
    }, i * 400));
  });
}

function simObjectStore() {
  const nodes = ['os0','oa0','os1','oa1','os2','oa2','os3'];
  const labels = ['PutObject to S3…','','EventBridge rule matched…','','Lambda triggered…','','DynamoDB PutItem ✓'];
  const status = document.getElementById('osStatus');
  nodes.forEach((id, i) => {
    simTimers.push(setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.classList.add('lit');
      if (labels[i]) status.textContent = labels[i];
      if (i === nodes.length - 1) {
        simTimers.push(setTimeout(() => {
          status.textContent = '202 Accepted';
          status.classList.add('accepted');
        }, 300));
      }
    }, i * 450));
  });
}

function simQueue() {
  const queue = document.getElementById('mqQueue');
  const dlq = document.getElementById('mqDLQ');
  const status = document.getElementById('mqStatus');
  const jobCount = 6;
  // Clear the SQS label
  simTimers.push(setTimeout(() => { queue.innerHTML = ''; }, 100));
  for (let i = 0; i < jobCount; i++) {
    simTimers.push(setTimeout(() => {
      const j = document.createElement('div');
      j.className = 'mq-job';
      j.id = `mj${i}`;
      j.textContent = `J${i+1}`;
      queue.appendChild(j);
      status.textContent = `SendMessage ${i+1}/${jobCount}`;
    }, 200 + i * 250));
  }
  for (let i = 0; i < jobCount; i++) {
    simTimers.push(setTimeout(() => {
      const j = document.getElementById(`mj${i}`);
      if (i === 2) {
        // Simulate a failure → DLQ
        if (j) { j.style.borderColor = 'var(--red)'; j.style.color = 'var(--red)'; j.style.background = 'var(--red-bg)'; }
        status.textContent = `J3 failed → retry → DLQ`;
        simTimers.push(setTimeout(() => {
          if (j) j.classList.add('consumed');
          const d = document.createElement('div');
          d.className = 'mq-job';
          d.textContent = 'J3';
          d.style.borderColor = 'var(--red)';
          d.style.color = 'var(--red)';
          d.style.background = 'var(--red-bg)';
          dlq.appendChild(d);
        }, 300));
      } else {
        if (j) j.classList.add('consumed');
        status.textContent = `DeleteMessage J${i+1} ✓`;
      }
      if (i === jobCount - 1) simTimers.push(setTimeout(() => { status.textContent = '✓ Queue drained — 1 in DLQ'; }, 400));
    }, jobCount * 250 + 600 + i * 350));
  }
}

function simWorkers() {
  const durations = [2000, 3200, 4500];
  for (let i = 0; i < 3; i++) {
    const ws = document.getElementById(`ws${i}`);
    const wb = document.getElementById(`wb${i}`);
    if (!ws || !wb) continue;
    ws.textContent = 'encoding…';
    ws.classList.add('encoding');
    const start = performance.now();
    const dur = durations[i];
    function tick() {
      const elapsed = performance.now() - start;
      const pct = Math.min(elapsed / dur, 1);
      wb.style.width = (pct * 100) + '%';
      if (pct < 1 && simRunning) {
        requestAnimationFrame(tick);
      } else if (pct >= 1) {
        ws.textContent = 'done ✓';
        ws.classList.remove('encoding');
        ws.classList.add('done');
        wb.classList.add('done-bar');
      }
    }
    requestAnimationFrame(tick);
  }
}

function simCDN() {
  const sequence = [
    { slot: 0, state: 'miss', label: 'MISS', msg: 'Edge-US: cache miss' },
    { slot: 1, state: 'miss', label: 'MISS', msg: 'Origin Shield: miss → fetching from S3' },
    { slot: 1, state: 'fill', label: 'FILL', msg: 'Origin Shield: caching from S3…' },
    { slot: 1, state: 'hit', label: 'CACHED', msg: 'Origin Shield: cached ✓' },
    { slot: 0, state: 'fill', label: 'FILL', msg: 'Edge-US: filling from Origin Shield…' },
    { slot: 0, state: 'hit', label: 'HIT', msg: 'Edge-US: serving — 12ms' },
    { slot: 2, state: 'miss', label: 'MISS', msg: 'Edge-EU: miss → Origin Shield HIT' },
    { slot: 2, state: 'hit', label: 'HIT', msg: 'Edge-EU: serving — 18ms (Shield hit)' },
    { slot: 3, state: 'miss', label: 'MISS', msg: 'Edge-Asia: miss → Origin Shield HIT' },
    { slot: 3, state: 'hit', label: 'HIT', msg: 'Edge-Asia: serving — 22ms (Shield hit)' },
    { slot: -1, state: '', label: '', msg: '✓ All edges warm — S3 origin saw only 1 fetch' },
  ];
  const msg = document.getElementById('cdnMsg');
  sequence.forEach((s, i) => {
    simTimers.push(setTimeout(() => {
      if (s.slot >= 0) {
        const el = document.getElementById(`cdn${s.slot}`);
        if (!el) return;
        el.className = `cdn-slot ${s.state}`;
        el.querySelector('.cdn-label').textContent = s.label;
      }
      msg.textContent = s.msg;
    }, i * 550));
  });
}

function goTo(i) { current = i; render(); }
function go(d) { current = Math.max(-1, Math.min(STEPS.length - 1, current + d)); render(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && current < STEPS.length - 1) go(1);
  if (e.key === 'ArrowLeft' && current > -1) go(-1);
});

render();
</script>
</body>
</html>
